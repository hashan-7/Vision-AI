<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Gallery | My Creations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #050507;
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-white: #ffffff;
            --muted-gray: #71717a;
            --luxury-line: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--accent-white);
            background-image:
                linear-gradient(var(--luxury-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--luxury-line) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            position: relative;
            margin: 0;
        }

        .navbar-floating {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: min(90%, 800px);
            z-index: 1000;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .h7-logo {
            font-family: "Rage Italic", "Rage", cursive;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #dcd7d7 0%, #e2dada 30%, #fff 50%, #d0cdcd 70%, #e0dddd 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: lowercase;
            line-height: 1;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            min-width: 0;
        }

        .nav-links a {
            color: var(--muted-gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
        }

        .user-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-profile img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #222;
            display: block;
        }

        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        .blob-1 {
            top: -10%;
            right: 0;
        }

        .blob-2 {
            bottom: 0;
            left: -10%;
            opacity: 0.5;
        }

        .gallery-container {
            padding-top: 130px;
        }

        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.4s ease;
            width: 100%;
        }

        .liquid-glass:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gallery-card:hover .img-wrapper img {
            transform: scale(1.1);
        }

        .card-actions {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }

        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .action-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-card {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 40px;
        }

        .gen-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }

        .premium-loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 100px auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 767.98px) {
            .navbar-floating {
                width: calc(100% - 24px);
                top: 12px;
                padding: 16px 18px;
                border-radius: 22px;
                flex-direction: column;
                gap: 14px;
                align-items: center;
            }

            .h7-logo {
                font-size: 2.4rem;
            }

            .nav-links {
                width: 100%;
                gap: 14px 18px;
            }

            .nav-links a {
                font-size: 0.88rem;
            }

            .gallery-container {
                padding-top: 250px;
                padding-left: 12px;
                padding-right: 12px;
                margin-top: 0 !important;
            }

            .liquid-glass {
                border-radius: 20px;
            }

            .premium-loader {
                margin: 60px auto;
            }
        }

        @media (max-width: 575.98px) {
            .navbar-floating {
                width: calc(100% - 16px);
                padding: 14px 14px;
                border-radius: 20px;
            }

            .nav-links {
                gap: 10px 14px;
            }

            .nav-links a {
                font-size: 0.82rem;
            }

            .gallery-container {
                padding-top: 262px;
                padding-left: 8px;
                padding-right: 8px;
            }

            #gallery-grid {
                justify-content: center;
            }

            #gallery-grid > div {
                width: 100%;
                max-width: 320px;
            }

            .card-actions {
                padding: 14px;
            }

            .modal-card {
                width: 100%;
                padding: 24px 18px;
            }

            .modal-card .d-flex {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav class="navbar-floating">
        <div class="h7-logo">h7</div>
        <div class="nav-links">
            <a href="/dashboard.html">Home</a>
            <a href="/gallery.html" class="active">Gallery</a>
            <a href="/settings.html">Settings</a>
            <a href="#" onclick="showLogoutModal()" class="text-danger">Logout</a>
        </div>
        <div class="user-profile"><img id="u-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile"></div>
    </nav>

    <main class="container gallery-container" style="margin-top: 60px;">
        <div class="mb-5">
            <h1 class="fw-800 m-0">My Gallery</h1>
            <p class="text-secondary small">Your neural masterpieces in one place.</p>
        </div>

        <div id="loader" class="premium-loader"></div>
        <div class="row g-4" id="gallery-grid"></div>
    </main>

    <div id="delete-modal" class="modal-overlay">
        <div class="liquid-glass modal-card">
            <h5 class="fw-bold mb-3">Permanent Delete?</h5>
            <p class="text-secondary small mb-4">This action cannot be undone. The image will be removed from Vision clusters.</p>
            <div class="d-flex gap-2">
                <button id="confirm-delete-btn" class="gen-btn" style="background: #ff4d4d; color: #fff;">Delete</button>
                <button onclick="hideDeleteModal()" class="gen-btn" style="background: transparent; border: 1px solid #fff; color: #fff;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="logout-modal" class="modal-overlay">
        <div class="liquid-glass modal-card">
            <h5 class="fw-bold mb-3">Terminate Session?</h5>
            <div class="d-flex gap-2">
                <button onclick="window.location.href='/logout'" class="gen-btn">Logout</button>
                <button onclick="hideLogoutModal()" class="gen-btn" style="background: transparent; border: 1px solid #fff; color: #fff;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
    let userId = null;
    let imageToDelete = null;

    function showLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
    function hideLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    function showDeleteModal(id) { imageToDelete = id; document.getElementById('delete-modal').style.display = 'flex'; }
    function hideDeleteModal() { imageToDelete = null; document.getElementById('delete-modal').style.display = 'none'; }

    async function init() {
        try {
            const r = await fetch('/api/user/success');
            const d = await r.json();
            if(d.success) {
                userId = d.userId;
                const profImg = document.getElementById('u-pic');
                if(profImg) {
                    profImg.src = d.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    profImg.onerror = function() {
                        this.src = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    };
                }
                loadGallery();
            } else {
                window.location.href = '/';
            }
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function loadGallery() {
        const grid = document.getElementById('gallery-grid');
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        try {
            const imgRes = await fetch(`/api/images/all?userId=${userId}`);
            const images = await imgRes.json();
            loader.style.display = 'none';
            grid.innerHTML = '';
            if(images.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-secondary">No neural artifacts found.</p></div>';
                return;
            }
            images.forEach(img => {
                const col = document.createElement('div');
                col.className = 'col-lg-3 col-md-4 col-6';
                col.innerHTML = `
                    <div class="liquid-glass gallery-card h-100">
                        <div class="img-wrapper">
                            <img src="${img.imageUrl}" alt="AI Art" loading="lazy">
                        </div>
                        <div class="card-actions">
                            <a href="${img.imageUrl}" download="h7_art_${img.id}.png" class="action-btn">
                                <i class="bi bi-download"></i>
                            </a>
                            <button onclick="showDeleteModal(${img.id})" class="action-btn btn-delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        } catch(e) {
            loader.style.display = 'none';
            alert("Connection error occurred while loading gallery.");
        }
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
        if(!imageToDelete) return;
        const btn = document.getElementById('confirm-delete-btn');
        btn.disabled = true;
        btn.innerText = "Deleting...";
        try {
            const r = await fetch(`/api/images/delete/${imageToDelete}`, { method: 'DELETE' });
            if(r.ok) {
                hideDeleteModal();
                loadGallery();
            } else {
                alert("Unauthorized or failed deletion.");
            }
        } catch(e) {
            alert("Network failure.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Delete";
        }
    });

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Settings | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #050507;
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-white: #ffffff;
            --muted-gray: #71717a;
            --luxury-line: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--accent-white);
            background-image: 
                linear-gradient(var(--luxury-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--luxury-line) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            position: relative;
            margin: 0;
        }

        .navbar-floating {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: min(90%, 800px);
            z-index: 1000;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .h7-logo {
            font-family: "Rage Italic", "Rage", cursive;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #dcd7d7 0%, #e2dada 30%, #fff 50%, #d0cdcd 70%, #e0dddd 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: lowercase;
            line-height: 1;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            min-width: 0;
        }

        .nav-links a {
            color: var(--muted-gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
        }

        .u-pic-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .u-pic-nav img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #222;
            display: block;
        }

        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        .blob-1 {
            top: -10%;
            right: -10%;
        }

        .blob-2 {
            bottom: -10%;
            left: -10%;
            opacity: 0.5;
        }

        .main-container {
            padding-top: 130px;
        }

        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
        }

        .profile-card {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .large-dp {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            aspect-ratio: 1/1;
            border: 4px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
            background: #222;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--muted-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 25px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .gen-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .gen-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.15);
        }

        .btn-danger-outline {
            background: transparent;
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
        }

        .btn-danger-outline:hover {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-card {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 40px;
        }

        footer {
            padding: 60px 0 40px;
            text-align: center;
            color: var(--muted-gray);
            font-size: 0.9rem;
            border-top: 1px solid var(--luxury-line);
            margin-top: 50px;
        }

        @media (max-width: 767.98px) {
            .navbar-floating {
                width: calc(100% - 24px);
                top: 12px;
                padding: 16px 18px;
                border-radius: 22px;
                flex-direction: column;
                gap: 14px;
                align-items: center;
            }

            .h7-logo {
                font-size: 2.4rem;
            }

            .nav-links {
                width: 100%;
                gap: 14px 18px;
            }

            .nav-links a {
                font-size: 0.88rem;
            }

            .main-container {
                padding-top: 250px;
                padding-left: 12px;
                padding-right: 12px;
            }

            .liquid-glass {
                padding: 28px 22px;
                border-radius: 20px;
            }

            .profile-card {
                max-width: 100%;
            }

            footer {
                padding: 36px 16px 28px;
                margin-top: 36px;
            }
        }

        @media (max-width: 575.98px) {
            .navbar-floating {
                width: calc(100% - 16px);
                padding: 14px 14px;
                border-radius: 20px;
            }

            .nav-links {
                gap: 10px 14px;
            }

            .nav-links a {
                font-size: 0.82rem;
            }

            .main-container {
                padding-top: 262px;
                padding-left: 8px;
                padding-right: 8px;
            }

            .liquid-glass {
                padding: 22px 16px;
            }

            .large-dp {
                width: 96px;
                height: 96px;
                margin-bottom: 20px;
            }

            .info-label {
                font-size: 0.74rem;
            }

            .info-value {
                font-size: 1rem;
                margin-bottom: 20px;
            }

            .modal-card {
                width: 100%;
                padding: 24px 18px;
            }

            .modal-card .d-flex {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav class="navbar-floating">
        <div class="h7-logo">h7</div>
        <div class="nav-links">
            <a href="/dashboard.html">Home</a>
            <a href="/gallery.html">Gallery</a>
            <a href="/settings.html" class="active">Settings</a>
            <a href="#" onclick="showLogoutModal()" class="text-danger">Logout</a>
        </div>
        <div class="u-pic-nav"><img id="u-pic-nav" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile"></div>
    </nav>

    <main class="container main-container">
        <div class="liquid-glass profile-card">
            <img id="u-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Display Picture" class="large-dp">
            
            <div class="info-group">
                <p class="info-label">Full Name</p>
                <p id="u-name" class="info-value">Loading profile...</p>
            </div>
            
            <div class="info-group mb-5">
                <p class="info-label">Email Address</p>
                <p id="u-email" class="info-value">Please wait...</p>
            </div>

            <hr style="border-color: var(--glass-border); margin-bottom: 30px;">
            
            <button onclick="showDeleteModal()" class="gen-btn btn-danger-outline">Delete Account</button>
        </div>
    </main>

    <div id="delete-modal" class="modal-overlay">
        <div class="liquid-glass modal-card">
            <h5 class="fw-bold mb-3">Irreversible Action!</h5>
            <p class="text-secondary small mb-4">Are you absolutely sure? This will permanently delete your vision account and all your generated neural artifacts.</p>
            <div class="d-flex gap-2">
                <button id="final-delete-btn" onclick="confirmDeleteAccount()" class="gen-btn" style="background: #ff4d4d; color: #fff;">Yes, Delete</button>
                <button onclick="hideDeleteModal()" class="gen-btn" style="background: transparent; border: 1px solid #fff; color: #fff;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="logout-modal" class="modal-overlay">
        <div class="liquid-glass modal-card">
            <h5 class="fw-bold mb-3">Terminate Session?</h5>
            <div class="d-flex gap-2">
                <button onclick="window.location.href='/logout'" class="gen-btn">Logout</button>
                <button onclick="hideLogoutModal()" class="gen-btn" style="background: transparent; border: 1px solid #fff; color: #fff;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
    function showLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
    function hideLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    function showDeleteModal() { document.getElementById('delete-modal').style.display = 'flex'; }
    function hideDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; }

    async function init() {
        try {
            const r = await fetch('/api/user/success');
            const d = await r.json();
            if(d.success) {
                document.getElementById('u-name').innerText = d.name || 'Anonymous User';
                document.getElementById('u-email').innerText = d.email || 'No email associated';
                
                const profileImages = [
                    document.getElementById('u-pic-nav'), 
                    document.getElementById('u-dp')
                ];

                profileImages.forEach(img => {
                    if(img) {
                        img.src = d.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                        img.onerror = function() {
                            this.src = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                        };
                    }
                });
            } else { 
                window.location.href = '/'; 
            }
        } catch(e) { 
            window.location.href = '/'; 
        }
    }

    async function confirmDeleteAccount() {
        const btn = document.getElementById("final-delete-btn"); 
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const r = await fetch('/api/user/delete', { method: 'DELETE' });
            const d = await r.json();

            if(d.success) {
                window.location.href = '/logout';
            } else { 
                alert("Account removal failed: " + (d.message || "Unknown error")); 
                btn.disabled = false;
                btn.innerText = "Yes, Delete";
            }
        } catch(e) { 
            alert("Network error: Could not connect to authentication server."); 
            btn.disabled = false;
            btn.innerText = "Yes, Delete";
        }
    }

    init();
</script>
</body>
</html>
